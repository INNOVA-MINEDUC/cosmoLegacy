version: '3.9'

services:
  php:
    build:
      context: ./php
    container_name: php-container
    restart: always
    volumes:
      - ./app:/var/www/html
    networks:
      - host

  nginx:
    image: nginx:latest
    container_name: nginx-container
    restart: always
    ports:
      - "8088:80"
    volumes:
      - ./app:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - host

  mariadb:
    image: mariadb:10
    container_name: mariadb-container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3326:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - host

volumes:
  mariadb_data:

networks:
  host:
