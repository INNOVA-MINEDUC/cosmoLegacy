version: '3.8'
services:
  app:
    build: .
    image: laravel-app:latest
    container_name: laravel-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./public/tmp-libros:/var/www/public/tmp-libros
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: sh -c "composer config --no-interaction allow-plugins.php-http/discovery true && composer update --ignore-platform-reqs --no-interaction && npm install && npm run build && php artisan serve --host=0.0.0.0 --port=8000"
volumes:
  dbdata: